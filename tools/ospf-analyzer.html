<!DOCTYPE html>

<html>
<head>
<title>ByteBabyLabs OSPF Analyzer</title>

<style>
body{
    font-family: Arial;
    margin:40px;
    background:#0f172a;
    color:white;
}

textarea{
    width:100%;
    height:200px;
}

button{
    padding:10px 20px;
    margin-top:10px;
}

pre{
    background:#111;
    padding:15px;
}
</style>

</head>

<body>

<h2>ByteBabyLabs OSPF Analyzer</h2>

<label>Prefix</label><br> <input id="prefix" placeholder="10.10.10.0">

<br><br>

<label>Paste OSPF Database</label>

<textarea id="lsdb"></textarea>

<br>

<button onclick="analyze()">Analyze</button>

<h3>Result</h3>
<pre id="result"></pre>

<script>

async function analyze(){

    const prefix=document.getElementById("prefix").value
    const lsdb=document.getElementById("lsdb").value

    const form=new FormData()

    form.append("prefix",prefix)

    const file=new Blob([lsdb],{type:"text/plain"})
    form.append("file",file,"lsdb.txt")

    const res=await fetch(
    "https://bytebabylabs-site.onrender.com/api/ospf/paths",
    {
        method:"POST",
        body:form
    })

    const data=await res.json()

    document.getElementById("result").textContent=
        JSON.stringify(data,null,2)

}

</script>

</body>
</html>
